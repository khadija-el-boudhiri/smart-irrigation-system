# Smart Irrigation MLOps - Prometheus Configuration
#
# To hot-reload config WITHOUT restarting the container:
#   curl -X POST http://localhost:9090/-/reload
# Requires Prometheus started with --web.enable-lifecycle (see docker-compose command below)

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/alerts.yml"

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "fastapi"
    scrape_interval: 5s
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "smart-irrigation-api"

  - job_name: "mlflow"
    scrape_interval: 30s
    metrics_path: /metrics
    static_configs:
      - targets: ["mlflow:5000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "mlflow-server"

  - job_name: "node-exporter"
    scrape_interval: 15s
    static_configs:
      - targets: ["node-exporter:9100"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "irrigation-host"
